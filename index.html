<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f9ff" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary SEO -->
    <title>Alex Morgan – Full Stack Developer & UI/UX Designer</title>
    <meta name="description" content="Premium Full Stack Developer specializing in React, Next.js, and Node.js. Building high-performance web applications and beautiful digital experiences." />
    <meta name="keywords" content="full stack developer, react developer, next.js, node.js, UI/UX designer, web development, TypeScript, portfolio" />
    <meta name="author" content="Alex Morgan" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Alex Morgan – Full Stack Developer" />
    <meta property="og:description" content="Premium Full Stack Developer building high-performance web apps with React, Next.js, and Node.js." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&h=630&fit=crop" />
    <meta property="og:url" content="https://alexmorgan.dev" />
    <meta property="og:site_name" content="Alex Morgan Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alex Morgan – Full Stack Developer" />
    <meta name="twitter:description" content="Premium Full Stack Developer building high-performance web apps." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&h=630&fit=crop" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Critical CSS to prevent FOUC -->
    <style>
      :root { --bg-primary: #050508; --text-primary: #f1f1f8; }
      body { background-color: var(--bg-primary); color: var(--text-primary); margin: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
